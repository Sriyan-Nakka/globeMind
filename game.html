<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="favicon.png" type="image/png" />
    <title>Globe Mind | Game</title>
    <link rel="stylesheet" href="global.css" />
    <script src="https://cdn.jsdelivr.net/npm/easytimer.js/dist/easytimer.min.js"></script>
    <style>
      @font-face {
        font-family: "country-font";
        src: url("fonts/SudoVariable.woff2") format("woff2");
      }
      body {
        margin-bottom: 100px;
      }
      h1 {
        font-size: 1.6rem;
      }
      footer {
        background-color: hsl(235, 100%, 10%);
        width: 100%;
        padding: 10px;
        padding-left: 0px;
        padding-right: 0px;
        display: flex;
        justify-content: space-evenly;
        align-items: center;
        font-size: 1rem;
        margin-top: 25px;
      }
      #modeHeader {
        color: green;
        /* margin-top: 10px; */
        margin-bottom: 15px;
        font-size: 1.7rem;
      }
      #gameContainer {
        background-color: hsl(240, 100%, 7%);
        width: 100%;
        border-radius: 10px;
        padding: 10px 0;
      }
      #flagImg {
        width: 200px;
        border: 2px solid lightseagreen;
        border-radius: 10px;
        margin: 5px;
        box-shadow: 2.5px 7px 10px hsla(177, 70%, 41%, 0.3);
      }
      #countryNameHints {
        font-family: "country-font";
      }
      #countryGuessField {
        pointer-events: none;
        margin-bottom: 6px;
        width: 325px;
        font-size: 1.2rem;
        background-color: #131313;
        color: #fff;
        border-radius: 7px;
        padding: 5px;
        border: 2px solid white;
        font-family: bodyfont, sans-serif;
      }

      .keyboard {
        display: flex;
        flex-direction: column;
        gap: clamp(0.2rem, 0.8vw, 0.4rem);
        max-width: 600px;
        width: 100%;
        margin: 0 auto;
        box-sizing: border-box;
        overflow-x: hidden;
        padding: 0 0.25rem;
      }

      .keyboard .row {
        display: flex;
        justify-content: center;
        gap: clamp(0.15rem, 0.6vw, 0.3rem);
        width: 100%;
        overflow: hidden;
      }

      .keyboard button {
        flex: 1 1 0;
        min-width: 0;
        height: 48px;
        padding: 0;
        border: none;
        border-radius: 6px;
        background: #0d0d3a;
        color: #ffffff;
        font-size: clamp(0.8rem, 2.8vw, 1rem);
        font-family: "headfont", sans-serif;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .keyboard button:active {
        transform: scale(0.95);
        background: #1a1a55;
      }

      .keyboard button.pressed {
        transform: scale(0.9);
        background: #ffffff;
        color: #0d0d3a;
        transition:
          transform 0.08s ease,
          background 0.08s ease,
          color 0.08s ease;
      }

      @media (hover: hover) and (pointer: fine) {
        .keyboard button:hover {
          background: #ffffff;
          color: #0d0d3a;
        }
      }

      .keyboard button.wide {
        flex: 0 0 auto;
        min-width: 64px;
        padding: 0 0.5rem;
      }

      .keyboard button.space {
        flex: 0 0 auto;
        min-width: 275px;
      }

      .keyboard .backspace {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .keyboard .backspace svg {
        width: clamp(16px, 4vw, 22px);
        height: clamp(16px, 4vw, 22px);
        fill: currentColor;
      }

      @media (max-width: 500px) {
        .keyboard {
          max-width: 100%;
          padding: 0 0.2rem;
        }

        .keyboard button {
          height: 50px;
          font-size: 0.85rem;
        }

        .keyboard button.wide {
          min-width: 56px;
        }

        .keyboard button.space {
          min-width: 225px;
        }
      }

      #info {
        display: flex;
        align-items: center;
        justify-content: space-evenly;
        background-color: rgb(6, 0, 65);
        margin-bottom: 15px;
        margin-top: 7px;
        font-size: 20px;
      }
      #info p {
        margin: 5px 0;
      }
      #info button#resetBtn {
        font-size: 22px;
        --c1: red;
        --c2: rgb(255, 50, 50);
        color: white;
        border: 2px solid white;
        margin-top: 10px;
      }
      #info button#hintBtn {
        font-size: 22px;
        --c1: yellow;
        --c2: rgb(255, 255, 100);
        color: black;
        border: 2px solid white;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <script src="script.js" defer></script>
    <header>
      <h1>Globe Mind</h1>

      <h3 id="modeHeader">Mode</h3>
    </header>
    <main>
      <div id="gameContainer">
        <img src="" alt="Country Flag Image" id="flagImg" />
        <p id="countryQuestion" style="margin: 0 0 10px 0">Loading...</p>
        <span style="display: block; font-size: 16px" id="hintsBlockSpan">
          <span> Answer: </span>
          <b>
            <span id="countryNameHints"> </span>
          </b>
        </span>
        <div id="info">
          <p>
            Q.No
            <b>
              <span id="questionNum">1</span>
            </b>
          </p>
          <p>|</p>
          <p id="timer" style="font-weight: bold">0:00</p>
          <p>|</p>
          <p id="hintBtnPara">
            <button id="hintBtn" class="btn">
              Get a Hint (
              <span id="hintsLeftSpan">3</span>
              )
            </button>
          </p>
          <p>|</p>
          <p>
            <a href="index.html">
              <button id="resetBtn" class="btn">Exit</button>
            </a>
          </p>
        </div>
        <input
          type="text"
          id="countryGuessField"
          placeholder="Type your Guess here"
        />
        <div id="checkSpan"></div>
        <div class="keyboard">
          <div class="row">
            <button data-key="q">Q</button>
            <button data-key="w">W</button>
            <button data-key="e">E</button>
            <button data-key="r">R</button>
            <button data-key="t">T</button>
            <button data-key="y">Y</button>
            <button data-key="u">U</button>
            <button data-key="i">I</button>
            <button data-key="o">O</button>
            <button data-key="p">P</button>
          </div>

          <div class="row">
            <button data-key="a">A</button>
            <button data-key="s">S</button>
            <button data-key="d">D</button>
            <button data-key="f">F</button>
            <button data-key="g">G</button>
            <button data-key="h">H</button>
            <button data-key="j">J</button>
            <button data-key="k">K</button>
            <button data-key="l">L</button>
          </div>

          <div class="row">
            <button data-key="z">Z</button>
            <button data-key="x">X</button>
            <button data-key="c">C</button>
            <button data-key="v">V</button>
            <button data-key="b">B</button>
            <button data-key="n">N</button>
            <button data-key="m">M</button>

            <button class="wide backspace" data-key="backspace">
              <svg viewBox="0 0 24 24">
                <path
                  d="M22 3H7c-.7 0-1.4.4-1.7 1L1 12l4.3 8c.3.6 1 1 1.7 1h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-4.6 12.6L16 17l-4-4-4 4-1.4-1.4 4-4-4-4L8 6l4 4 4-4 1.4 1.4-4 4 4 4z"
                />
              </svg>
            </button>
          </div>
          <div class="row">
            <button class="wide" data-key="enter" style="flex: 1">Guess</button>

            <button class="wide space" data-key="space">Space</button>
          </div>
        </div>
      </div>
    </main>
    <span style="color: yellow; font-size: 0.9rem; display: block"
      >Note: Answers to questions are based on Country Lookup API.</span
    >
    <footer>
      <div id="links">
        <a
          href="https://github.com/Sriyan-Nakka"
          target="_blank"
          title="My GitHub"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            width="25px"
            height="25px"
          >
            <path
              fill="white"
              d="M12 1A10.89 10.89 0 0 0 1 11.77A10.79 10.79 0 0 0 8.52 22c.55.1.75-.23.75-.52v-1.83c-3.06.65-3.71-1.44-3.71-1.44a2.86 2.86 0 0 0-1.22-1.58c-1-.66.08-.65.08-.65a2.31 2.31 0 0 1 1.68 1.11a2.37 2.37 0 0 0 3.2.89a2.33 2.33 0 0 1 .7-1.44c-2.44-.27-5-1.19-5-5.32a4.15 4.15 0 0 1 1.11-2.91a3.78 3.78 0 0 1 .11-2.84s.93-.29 3 1.1a10.7 10.7 0 0 1 5.5 0c2.1-1.39 3-1.1 3-1.1a3.78 3.78 0 0 1 .11 2.84A4.15 4.15 0 0 1 19 11.2c0 4.14-2.58 5.05-5 5.32a2.5 2.5 0 0 1 .75 2v2.95c0 .35.2.63.75.52A10.8 10.8 0 0 0 23 11.77A10.89 10.89 0 0 0 12 1"
            />
          </svg>
        </a>
        <a
          href="https://sriyansites.web.app"
          target="_blank"
          title="My Website"
        >
          <svg
            width="25px"
            height="25px"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
            fill="#000000"
          >
            <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
            <g
              id="SVGRepo_tracerCarrier"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></g>
            <g id="SVGRepo_iconCarrier">
              <defs>
                <style>
                  .cls-1 {
                    fill: none;
                    stroke: #ffffff;
                    stroke-miterlimit: 10;
                    stroke-width: 1.92px;
                  }
                </style>
              </defs>
              <g id="roll_brush" data-name="roll brush">
                <rect
                  class="cls-1"
                  x="1.46"
                  y="1.5"
                  width="21.1"
                  height="21.1"
                ></rect>
                <polygon
                  class="cls-1"
                  points="22.56 7.25 16.28 7.25 14.37 7.25 1.46 7.25 1.46 1.5 22.56 1.5 22.56 7.25"
                ></polygon>
                <line
                  class="cls-1"
                  x1="4.34"
                  y1="4.38"
                  x2="6.25"
                  y2="4.38"
                ></line>
                <line
                  class="cls-1"
                  x1="8.17"
                  y1="4.38"
                  x2="10.09"
                  y2="4.38"
                ></line>
                <line
                  class="cls-1"
                  x1="12.01"
                  y1="4.38"
                  x2="13.93"
                  y2="4.38"
                ></line>
              </g>
            </g>
          </svg>
        </a>
      </div>
      <div id="copyrightName">&copy; Sai Sriyan Nakka, 2026.</div>
      <div id="versionNum">v1.2.0</div>
    </footer>
  </body>
</html>
